<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Meme Matcher</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <h1>Face Meme Matcher</h1>

    <!-- THREE PANELS -->
    <div class="container">

        <!-- LEFT: Live webcam -->
        <div class="panel" id="camera-panel">
            <h2>Your Camera</h2>
            <video id="video" autoplay muted></video>
        </div>

        <!-- MIDDLE: Matched meme -->
        <div class="panel" id="meme-panel">
            <h2>Your Meme Match</h2>
            <img id="meme-display" src="" alt="Match a pose to see your meme!" />
            <p id="meme-label" style="color:white; margin-top:10px; font-size:18px;"></p>
        </div>

        <!-- RIGHT: Meme gallery -->
        <div class="panel" id="gallery-panel">
            <h2>Meme Gallery</h2>
            <div id="gallery"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="/static/js/app.js"></script>

</body>
</html>
